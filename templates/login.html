<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { joinville: '#002D72' },
                    animation: { 'slide-in-right': 'slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1)' },
                    keyframes: { slideInRight: { '0%': { transform: 'translateX(100%)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } } }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans text-gray-800">
    
    <div id="toast-container" class="fixed top-5 right-5 z-[60] flex flex-col gap-3 pointer-events-none"></div>

    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden border border-gray-200">
        <div class="bg-joinville p-6 flex flex-col items-center justify-center border-b border-blue-900/30">
            <img src="https://www.joinville.sc.gov.br/wp-content/uploads/2021/09/Logotipo_Prefeitura_SaoJose_horizontal_negativo.png" class="h-10 opacity-95 mb-3">
            <div class="text-center"><h1 class="text-2xl font-bold text-white tracking-tight leading-none">Nexus</h1><p class="text-blue-200 text-[10px] uppercase tracking-[0.2em] mt-1 font-medium">Repositório Clínico Seguro</p></div>
        </div>
        <div class="p-8">
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Usuário / Matrícula</label><input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-joinville focus:border-joinville outline-none transition" required></div>
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Senha</label><input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-joinville focus:border-joinville outline-none transition" required></div>
                <div id="errorMsg" class="text-red-500 text-sm font-bold text-center hidden bg-red-50 p-2 rounded border border-red-100"></div>
                <button type="submit" id="btn" class="w-full bg-joinville hover:bg-blue-900 text-white font-bold py-3 rounded-lg shadow-lg transition transform active:scale-95">ENTRAR NO SISTEMA</button>
            </form>
            <div class="mt-6 text-center border-t pt-4"><p class="text-xs text-gray-400">Acesso restrito a pessoal autorizado.</p><p class="text-[10px] text-gray-300 mt-1">&copy; 2025 Lucas Weber</p></div>
        </div>
    </div>
    <script>
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const borderClass = type === 'success' ? 'border-green-500' : 'border-red-500';
            const icon = type === 'success' ? '✅' : '⚠️';
            toast.className = `pointer-events-auto flex items-center gap-3 w-72 p-4 rounded bg-white shadow-2xl border-l-4 ${borderClass} animate-slide-in-right`;
            toast.innerHTML = `<span class="text-lg">${icon}</span><span class="text-sm font-bold text-gray-700">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        async function handleLogin(e) {
            e.preventDefault(); const btn = document.getElementById('btn'); const err = document.getElementById('errorMsg');
            btn.disabled = true; btn.innerText = "Verificando..."; err.classList.add('hidden');
            const formData = new URLSearchParams(); formData.append('username', document.getElementById('username').value); formData.append('password', document.getElementById('password').value);
            try {
                const res = await fetch('/token', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: formData });
                if (res.ok) { 
                    const data = await res.json(); localStorage.setItem('nexus_token', data.access_token); localStorage.setItem('nexus_user', data.user_full_name); localStorage.setItem('nexus_role', data.role); 
                    showToast('Login realizado com sucesso!', 'success');
                    setTimeout(() => window.location.href = '/', 500);
                } 
                else { 
                    err.innerText = "Credenciais inválidas."; err.classList.remove('hidden'); 
                    showToast('Usuário ou senha incorretos.', 'error');
                    btn.disabled = false; btn.innerText = "ENTRAR NO SISTEMA"; 
                }
            } catch (e) { showToast('Sistema indisponível. Tente novamente.', 'error'); btn.disabled = false; btn.innerText = "ENTRAR NO SISTEMA"; }
        }
    </script>
</body>
</html>
