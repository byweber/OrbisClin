{% extends "base.html" %}
{% block title %}Nexus - Auditoria{% endblock %}
{% block subtitle %}Trilha de Auditoria{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-sm text-left">
            <thead class="bg-gray-50 text-gray-500 font-bold uppercase border-b border-gray-200">
                <tr><th class="px-6 py-3">Data/Hora</th><th class="px-6 py-3">Usuário</th><th class="px-6 py-3">Ação</th><th class="px-6 py-3">Alvo</th><th class="px-6 py-3">Detalhes</th></tr>
            </thead>
            <tbody id="auditBody" class="divide-y divide-gray-100 font-mono text-xs"></tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    async function loadAudit(){
        const r = await authFetch('/api/audit');
        if(r.ok){
            const logs = await r.json();
            const tb = document.getElementById('auditBody'); tb.innerHTML='';
            logs.forEach(l=>{
                let c = l.action.includes('FAIL') || l.action.includes('BLOCKED') ? 'text-red-600 font-bold' : (l.action.includes('LOGIN') ? 'text-green-600' : 'text-blue-600');
                tb.innerHTML+=`<tr class="hover:bg-gray-50"><td class="px-6 py-2 text-gray-400">${l.time}</td><td class="px-6 py-2 font-bold text-gray-700">${l.user}</td><td class="px-6 py-2 ${c}">${l.action}</td><td class="px-6 py-2">${l.target||'-'}</td><td class="px-6 py-2 text-gray-500 truncate max-w-xs" title="${l.details||''}">${l.details||'-'}</td></tr>`;
            });
        }
    }
    loadAudit();
</script>
{% endblock %}
