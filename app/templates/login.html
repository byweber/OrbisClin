<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbisClin — Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{orbis:'#0E2F66',orbislight:'#1A4FA0'},animation:{'slide-in-right':'slideInRight 0.3s cubic-bezier(0.16,1,0.3,1)'},keyframes:{slideInRight:{'0%':{transform:'translateX(100%)',opacity:'0'},'100%':{transform:'translateX(0)',opacity:'1'}}}}}}</script>
    <style>
        body{background:linear-gradient(135deg,#0E2F66 0%,#1A4FA0 60%,#2563AB 100%);min-height:100vh;}
    </style>
</head>
<body class="flex items-center justify-center font-sans text-gray-800 p-4">
    <div id="toast-container" class="fixed top-5 right-5 z-[60] flex flex-col gap-3 pointer-events-none"></div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <svg width="210" height="60" viewBox="0 0 210 60" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="30" cy="30" rx="26" ry="26" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
                <ellipse cx="30" cy="30" rx="19" ry="19" fill="none" stroke="white" stroke-width="1" opacity="0.38"/>
                <circle cx="30" cy="30" r="12" fill="white" opacity="0.95"/>
                <rect x="24.5" y="27" width="11" height="6" rx="1.5" fill="#1A4FA0"/>
                <rect x="27" y="24.5" width="6" height="11" rx="1.5" fill="#1A4FA0"/>
                <circle cx="30" cy="4"  r="2.8" fill="white" opacity="0.65"/>
                <circle cx="56" cy="30" r="2.2" fill="white" opacity="0.42"/>
                <circle cx="11" cy="49" r="2"   fill="white" opacity="0.32"/>
                <text x="68" y="24" font-family="Georgia,'Times New Roman',serif" font-size="18" font-weight="700" fill="white" letter-spacing="-0.3">Orbis</text>
                <text x="68" y="43" font-family="Georgia,'Times New Roman',serif" font-size="18" font-weight="400" fill="white" opacity="0.85" letter-spacing="-0.3">Clin</text>
                <line x1="68" y1="48" x2="155" y2="48" stroke="white" stroke-width="0.5" opacity="0.2"/>
                <text x="68" y="56" font-family="'Helvetica Neue',Arial,sans-serif" font-size="7" fill="white" opacity="0.5" letter-spacing="2">GESTÃO DE IMAGENS CLÍNICAS</text>
            </svg>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="px-8 pt-8 pb-2">
                <h2 class="text-lg font-bold text-gray-700 mb-1">Acesso ao sistema</h2>
                <p class="text-xs text-gray-400 mb-6">Restrito a pessoal autorizado da instituição.</p>
            </div>
            <form onsubmit="handleLogin(event)" class="px-8 pb-8 space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Usuário</label>
                    <input type="text" id="username" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orbislight outline-none transition text-sm bg-gray-50 focus:bg-white" required autocomplete="username" placeholder="seu.login">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Senha</label>
                    <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orbislight outline-none transition text-sm bg-gray-50 focus:bg-white" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <div id="errorMsg" class="hidden text-sm font-bold text-red-600 bg-red-50 border border-red-100 rounded-lg px-4 py-3 text-center"></div>
                <button type="submit" id="btn" class="w-full bg-orbis hover:bg-orbislight text-white font-bold py-3.5 rounded-xl shadow-lg transition text-sm tracking-wide">
                    ENTRAR
                </button>
            </form>
        </div>

        <p class="text-center text-white/30 text-xs mt-6">&copy; 2025 OrbisClin</p>
    </div>

<script>
    function showToast(message, type='error') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `pointer-events-auto flex items-center gap-3 w-80 p-4 rounded-xl bg-white shadow-2xl border-l-4 ${type==='success'?'border-green-500':'border-red-500'} animate-slide-in-right`;
        t.innerHTML = `<span class="text-lg">${type==='success'?'✅':'⚠️'}</span><span class="text-sm font-bold text-gray-700 flex-1">${message}</span>`;
        c.appendChild(t);
        setTimeout(()=>t.remove(), 4000);
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btn');
        const err = document.getElementById('errorMsg');
        btn.disabled = true; btn.innerText = 'Verificando...'; err.classList.add('hidden');

        const fd = new URLSearchParams();
        fd.append('username', document.getElementById('username').value.trim());
        fd.append('password', document.getElementById('password').value);

        try {
            const res = await fetch('/token', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: fd,
                credentials: 'same-origin',
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('orbisclin_user', data.user_full_name);
                localStorage.setItem('orbisclin_role', data.role);
                showToast('Acesso autorizado!', 'success');
                setTimeout(() => window.location.href = '/', 400);
            } else {
                const d = await res.json().catch(()=>({}));
                const msg = d.detail || 'Credenciais inválidas.';
                err.innerText = msg; err.classList.remove('hidden');
                btn.disabled = false; btn.innerText = 'ENTRAR';
            }
        } catch(e) {
            showToast('Sistema indisponível.', 'error');
            btn.disabled = false; btn.innerText = 'ENTRAR';
        }
    }
</script>
</body>
</html>
