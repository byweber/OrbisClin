{% extends "base.html" %}
{% block title %}OrbisClin — Relatórios{% endblock %}
{% block subtitle %}Relatórios Gerenciais{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-6">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
        <h3 class="text-orbislight font-bold mb-4">Filtros do Relatório</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div><label class="lbl">De</label><input type="date" id="repStart" class="inp"></div>
            <div><label class="lbl">Até</label><input type="date" id="repEnd" class="inp"></div>
            <div><label class="lbl">Solicitante</label><input type="text" id="repReq" class="inp uppercase" placeholder="Nome Médico"></div>
            <div>
                <label class="lbl">Tipo</label>
                <select id="repType" class="inp">
                    <option value="">TODOS</option>
                    <option value="AUDIOMETRIA">AUDIOMETRIA</option>
                    <option value="AVALIAÇÃO DE FERIDAS">AVALIAÇÃO DE FERIDAS</option>
                    <option value="DERMATOLOGIA">DERMATOLOGIA</option>
                    <option value="ECG">ECG</option>
                    <option value="EEG">EEG</option>
                    <option value="HOLTER">HOLTER</option>
                </select>
            </div>
        </div>
        <div class="mt-4 flex flex-wrap gap-3">
            <button onclick="runReport()" class="bg-orbis text-white font-bold py-2 px-6 rounded hover:bg-orbislight transition shadow">GERAR RELATÓRIO</button>
            <div class="h-auto w-px bg-gray-300 mx-2"></div>
            <button onclick="exportCSV()" class="bg-green-600 text-white font-bold py-2 px-6 rounded hover:bg-green-700 transition shadow flex items-center gap-2">
                <span>📊</span> EXCEL (CSV)
            </button>
            <button onclick="exportPDF()" class="bg-red-600 text-white font-bold py-2 px-6 rounded hover:bg-red-700 transition shadow flex items-center gap-2">
                <span>📄</span> PDF
            </button>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-sm text-left">
            <thead class="bg-gray-50 text-gray-500 font-bold uppercase border-b border-gray-200">
                <tr>
                    <th class="px-6 py-3">Data</th>
                    <th class="px-6 py-3">Paciente</th>
                    <th class="px-6 py-3">Tipo</th>
                    <th class="px-6 py-3">Solicitante</th>
                    <th class="px-6 py-3">Executante</th>
                </tr>
            </thead>
            <tbody id="repBody" class="divide-y divide-gray-100"></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script>
    let currentData = [];

    document.getElementById('repStart').max = new Date().toISOString().split('T')[0];
    document.getElementById('repEnd').max   = new Date().toISOString().split('T')[0];

    async function runReport() {
        const btn = document.querySelector('button[onclick="runReport()"]');
        btn.disabled = true; btn.innerText = 'GERANDO...';
        try {
            const ps = new URLSearchParams({
                start: document.getElementById('repStart').value,
                end:   document.getElementById('repEnd').value,
                type:  document.getElementById('repType').value,
                req:   document.getElementById('repReq').value,
            });
            const r = await authFetch('/api/reports?' + ps.toString());
            if (!r.ok) { showToast('Erro ao buscar dados.', 'error'); return; }
            currentData = await r.json();
            const tb = document.getElementById('repBody');
            tb.innerHTML = '';
            if (currentData.length === 0) { showToast('Nenhum dado encontrado.', 'info'); return; }
            currentData.forEach(i => {
                tb.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-2 text-gray-600 font-mono text-xs">${i.exam_date || '-'}</td>
                        <td class="px-6 py-2 font-bold text-gray-800">${i.patient_name}</td>
                        <td class="px-6 py-2"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-[10px] font-bold border border-blue-100">${i.procedure}</span></td>
                        <td class="px-6 py-2 text-xs text-gray-500 uppercase">${i.requesting_physician || '-'}</td>
                        <td class="px-6 py-2 text-xs text-gray-500 uppercase">${i.performing_physician || '-'}</td>
                    </tr>`;
            });
            showToast(`${currentData.length} registros carregados.`, 'success');
        } catch(e) { showToast('Erro de conexão.', 'error'); }
        finally { btn.disabled = false; btn.innerText = 'GERAR RELATÓRIO'; }
    }

    function _fmtDateBR(iso) {
        if (!iso) return '';
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
    }

    function getStamp() {
        return `Gerado por: ${localStorage.getItem('orbisclin_user') || 'Usuário'} em ${new Date().toLocaleString('pt-BR')}`;
    }

    function exportCSV() {
        if (!currentData.length) { showToast('Gere o relatório primeiro.', 'error'); return; }
        let csv = '\uFEFF' + getStamp() + '\n\nData;Paciente;Tipo;Solicitante;Executante\n';
        currentData.forEach(r => { csv += `${r.exam_date};${r.patient_name};${r.procedure};${r.requesting_physician};${r.performing_physician}\n`; });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        a.download = `OrbisClin_Export_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
        a.click();
        showToast('Download CSV iniciado.', 'success');
    }

    function exportPDF() {
        if (!currentData.length) { showToast('Gere o relatório primeiro.', 'error'); return; }
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pw = doc.internal.pageSize.width;
            const ph = doc.internal.pageSize.height;

            doc.setFillColor(14, 47, 102);
            doc.rect(0, 0, pw, 22, 'F');
            doc.setFontSize(16); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
            doc.text('Relatório Analítico — OrbisClin', 14, 14);

            doc.setTextColor(50,50,50); doc.setFontSize(9); doc.setFont('helvetica','normal');
            const start = document.getElementById('repStart').value;
            const end   = document.getElementById('repEnd').value;
            const type  = document.getElementById('repType').value || 'TODOS';
            doc.text(`Período: ${_fmtDateBR(start)||'Início'} a ${_fmtDateBR(end)||'Hoje'}  |  Tipo: ${type}`, 14, 29);

            doc.autoTable({
                startY: 34,
                head: [['Data','Paciente','Tipo','Solicitante','Executante']],
                body: currentData.map(r => [r.exam_date||'-', r.patient_name, r.procedure, r.requesting_physician||'-', r.performing_physician||'-']),
                theme: 'striped',
                headStyles: { fillColor: [14,47,102] },
                styles: { fontSize: 8 },
                columnStyles: { 0: { cellWidth: 25 }, 2: { cellWidth: 25 } },
            });

            const total = doc.internal.getNumberOfPages();
            for (let i = 1; i <= total; i++) {
                doc.setPage(i);
                doc.setFontSize(7); doc.setTextColor(150,150,150);
                doc.text(getStamp(), 14, ph - 10);
                const pg = `Página ${i} de ${total}`;
                doc.text(pg, pw - 14 - doc.getTextWidth(pg), ph - 10);
            }
            doc.save(`OrbisClin_Relatorio_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
            showToast('Download PDF iniciado.', 'success');
        } catch(e) { console.error(e); showToast('Erro ao gerar PDF.', 'error'); }
    }
</script>
{% endblock %}
